<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#18181b"/>
      <stop offset="100%" style="stop-color:#27272a"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Title -->
  <text x="80" y="200" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="700" fill="#fafafa">Cloud Sync</text>
  <text x="80" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#a1a1aa">One SQLite file. Sync anywhere.</text>

  <!-- Sync diagram -->
  <g transform="translate(80, 320)">
    <!-- Device 1 -->
    <rect x="0" y="0" width="120" height="80" rx="8" fill="#18181b" stroke="#3f3f46" stroke-width="1"/>
    <text x="60" y="35" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#d4d4d8">Desktop</text>
    <text x="60" y="55" text-anchor="middle" font-family="ui-monospace, monospace" font-size="12" fill="#52525b">Linux/macOS</text>

    <!-- Arrow -->
    <line x1="130" y1="40" x2="190" y2="40" stroke="#3f3f46" stroke-width="2" stroke-dasharray="4"/>
    <polygon points="190,35 200,40 190,45" fill="#3f3f46"/>

    <!-- Cloud -->
    <g transform="translate(210, 10)">
      <ellipse cx="60" cy="30" rx="50" ry="25" fill="#27272a" stroke="#3f3f46" stroke-width="1"/>
      <text x="60" y="35" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#a1a1aa">Nextcloud</text>
    </g>

    <!-- Arrow back -->
    <line x1="270" y1="40" x2="330" y2="40" stroke="#3f3f46" stroke-width="2" stroke-dasharray="4"/>
    <polygon points="330,35 340,40 330,45" fill="#3f3f46"/>

    <!-- Device 2 -->
    <rect x="350" y="0" width="120" height="80" rx="8" fill="#18181b" stroke="#3f3f46" stroke-width="1"/>
    <text x="410" y="35" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#d4d4d8">Laptop</text>
    <text x="410" y="55" text-anchor="middle" font-family="ui-monospace, monospace" font-size="12" fill="#52525b">Windows/macOS</text>
  </g>

  <!-- Features -->
  <g font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#a1a1aa">
    <circle cx="90" cy="480" r="4" fill="#52525b"/>
    <text x="108" y="486">Single SQLite database file</text>
    <circle cx="400" cy="480" r="4" fill="#52525b"/>
    <text x="418" y="486">Works with any cloud provider</text>
    <circle cx="800" cy="480" r="4" fill="#52525b"/>
    <text x="818" y="486">Zero configuration</text>
  </g>

  <!-- Supported providers -->
  <text x="600" y="550" text-anchor="middle" font-family="ui-monospace, monospace" font-size="14" fill="#52525b">Nextcloud  &#x2022;  ownCloud  &#x2022;  Dropbox  &#x2022;  Syncthing  &#x2022;  any folder</text>
</svg>
