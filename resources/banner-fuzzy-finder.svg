<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#18181b"/>
      <stop offset="100%" style="stop-color:#27272a"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Left section -->
  <text x="80" y="200" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="700" fill="#fafafa">Fuzzy Finder</text>
  <text x="80" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#a1a1aa">Search feeds and articles instantly</text>

  <!-- Keyboard shortcut -->
  <g transform="translate(80, 310)">
    <rect width="180" height="44" rx="8" fill="#27272a" stroke="#3f3f46" stroke-width="1"/>
    <text x="90" y="29" text-anchor="middle" font-family="ui-monospace, monospace" font-size="18" fill="#d4d4d8">Ctrl + Shift + F</text>
  </g>

  <!-- Features list -->
  <g font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#a1a1aa">
    <circle cx="90" cy="400" r="4" fill="#52525b"/>
    <text x="108" y="406">Search by title, URL, or author</text>
    <circle cx="90" cy="440" r="4" fill="#52525b"/>
    <text x="108" y="446">Arrow keys to navigate</text>
    <circle cx="90" cy="480" r="4" fill="#52525b"/>
    <text x="108" y="486">Enter to select, Escape to close</text>
    <circle cx="90" cy="520" r="4" fill="#52525b"/>
    <text x="108" y="526">Feeds searched in-memory, articles via API</text>
  </g>

  <!-- Right section: mockup -->
  <g transform="translate(700, 100)">
    <!-- Window frame -->
    <rect width="420" height="430" rx="12" fill="#09090b" stroke="#3f3f46" stroke-width="1"/>

    <!-- Title bar -->
    <rect width="420" height="36" rx="12" fill="#18181b"/>
    <rect y="12" width="420" height="24" fill="#18181b"/>
    <circle cx="20" cy="18" r="6" fill="#ef4444"/>
    <circle cx="40" cy="18" r="6" fill="#eab308"/>
    <circle cx="60" cy="18" r="6" fill="#22c55e"/>

    <!-- Search input -->
    <rect x="16" y="48" width="388" height="36" rx="6" fill="#18181b" stroke="#3f3f46" stroke-width="1"/>
    <text x="48" y="72" font-family="ui-monospace, monospace" font-size="14" fill="#a1a1aa">Search feeds and articles...</text>
    <text x="28" y="72" font-family="system-ui, sans-serif" font-size="14" fill="#52525b">&#x1F50D;</text>

    <!-- Results: Feeds section -->
    <text x="28" y="112" font-family="system-ui, sans-serif" font-size="11" fill="#52525b" text-transform="uppercase" letter-spacing="1">FEEDS</text>

    <!-- Feed result 1 (selected) -->
    <rect x="16" y="120" width="388" height="48" rx="6" fill="#27272a"/>
    <circle cx="36" cy="144" r="8" fill="#3f3f46"/>
    <text x="54" y="140" font-family="system-ui, sans-serif" font-size="14" font-weight="500" fill="#fafafa">Ars Technica</text>
    <text x="54" y="156" font-family="ui-monospace, monospace" font-size="11" fill="#52525b">arstechnica.com</text>

    <!-- Feed result 2 -->
    <rect x="16" y="174" width="388" height="48" rx="6" fill="#09090b"/>
    <circle cx="36" cy="198" r="8" fill="#3f3f46"/>
    <text x="54" y="194" font-family="system-ui, sans-serif" font-size="14" font-weight="500" fill="#d4d4d8">TechCrunch</text>
    <text x="54" y="210" font-family="ui-monospace, monospace" font-size="11" fill="#52525b">techcrunch.com</text>

    <!-- Feed result 3 -->
    <rect x="16" y="228" width="388" height="48" rx="6" fill="#09090b"/>
    <circle cx="36" cy="252" r="8" fill="#3f3f46"/>
    <text x="54" y="248" font-family="system-ui, sans-serif" font-size="14" font-weight="500" fill="#d4d4d8">The Verge</text>
    <text x="54" y="264" font-family="ui-monospace, monospace" font-size="11" fill="#52525b">theverge.com</text>

    <!-- Results: Articles section -->
    <text x="28" y="308" font-family="system-ui, sans-serif" font-size="11" fill="#52525b" text-transform="uppercase" letter-spacing="1">ARTICLES</text>

    <!-- Article result 1 -->
    <rect x="16" y="316" width="388" height="48" rx="6" fill="#09090b"/>
    <rect x="36" y="328" width="12" height="12" rx="2" fill="#3f3f46"/>
    <text x="56" y="338" font-family="system-ui, sans-serif" font-size="13" fill="#d4d4d8">New AI breakthrough in protein folding</text>
    <text x="56" y="354" font-family="ui-monospace, monospace" font-size="11" fill="#52525b">Ars Technica</text>

    <!-- Article result 2 -->
    <rect x="16" y="370" width="388" height="48" rx="6" fill="#09090b"/>
    <rect x="36" y="382" width="12" height="12" rx="2" fill="#3f3f46"/>
    <text x="56" y="392" font-family="system-ui, sans-serif" font-size="13" fill="#d4d4d8">React 19 features deep dive</text>
    <text x="56" y="408" font-family="ui-monospace, monospace" font-size="11" fill="#52525b">TechCrunch</text>

    <!-- Footer -->
    <rect y="406" width="420" height="24" fill="#18181b" rx="0" ry="0"/>
    <text x="20" y="422" font-family="ui-monospace, monospace" font-size="11" fill="#52525b">&#x2191;&#x2193; navigate   &#x21B5; select   esc close</text>
  </g>
</svg>
